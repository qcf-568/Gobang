<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>五子棋</title>
	<style>
	body{
		 background:url(游戏文件/五子棋.jpg);
         background-size:cover;
         background-repeat:no-repeat;
	}
	a{
		position: absolute;
		left: 30%;
		top: 40%;
		text-decoration:none;
		text-align: center;
		display:block; 
        margin-top: 50px;
		width:500px; 
		height:350px;
		font-size: 70px;
		font-weight:bold;
		color: black;
		
	}
    @media screen and (max-width:1200px){
        body{
         background:url(游戏文件/五子棋.jpg);
         background-size:cover;
         background-repeat:no-repeat;
    }
    a{
        position: absolute;
        left: 20%;
        top: 30%;
        text-decoration:none;
        text-align: center;
        display:block; 
        margin-top: 50px;
        width:500px; 
        height:350px;
        font-size: 70px;
        font-weight:bold;
        color: black;
        
    }
    }
	.myDIV {
    -webkit-animation: mymove 10s infinite; 
    animation: mymove 10s infinite;
    font-weight:bold;
    display:block; 
    user-select:none;
    position: relative;
    top:20px;
    }
    @-webkit-keyframes mymove {
    20% {text-shadow: 20px 0px 30px black; color: blue;}
    40% {text-shadow: -20px 0px 30px black; color: red;}
    60% {text-shadow: 0px 20px 30px black; color: orange;}
    80% {text-shadow: 0px -20px 30px black; color: yellow;}
    }
    @keyframes mymove {
    20% {text-shadow: 20px 0px 30px black; color: blue;}
    40% {text-shadow: -20px 0px 30px black; color: red;}
    60% {text-shadow: 0px 20px 30px black; color: orange;}
    80% {text-shadow: 0px -20px 30px black; color: yellow;}
    }
	</style>
</head>
<body>
  <center class="myDIV" style="font-size:150px">五子棋</center>
	<a class="myDIV" href="游戏文件/第二页.html">开始下棋</a>
</body>
</html>
